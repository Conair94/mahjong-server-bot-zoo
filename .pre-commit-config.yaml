# Pre-commit hooks implementing the verification ladder (CLAUDE.md):
#   1. Formatter (ruff format)
#   2. Linter / static analysis (ruff check)
#   3. Type-check (mypy)
#   4. Unit tests for the rules engine (pytest; fast subset only)
#
# Heavier checks (cross-platform determinism, integration tests, Botzone
# judge-acceptance) run in CI, not pre-commit, to keep the local loop fast.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: ["pytest"]
        # Run mypy on the package; pytest's own tree is lenient by default.
        files: "^mahjong/"

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast unit tests only)
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        args: ["-x", "-m", "not integration and not linux_only"]
