# CI matrix per docs/specs/determinism.md § Cross-platform stability:
#   Linux (Ubuntu LTS) and macOS, Python 3.12 and latest.
#   A divergence on any cell is a release blocker.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # PyMahjongGB build can be flaky on fresh runners; install dev tooling
          # without it first so lint/type/scaffold checks aren't gated on it.
          pip install -e ".[dev]" || pip install -e . --no-deps && pip install ".[dev]" --no-deps

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (strict on engine + table)
        run: mypy mahjong/

      - name: Pytest (fast suite)
        run: pytest -m "not integration and not linux_only"

      - name: Pytest (integration suite)
        if: matrix.os == 'ubuntu-latest'
        run: pytest -m integration || echo "no integration tests yet"

      - name: Pytest (Linux-only suite)
        if: matrix.os == 'ubuntu-latest'
        run: pytest -m linux_only || echo "no linux_only tests yet"
